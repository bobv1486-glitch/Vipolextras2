<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light">
    <title>Folha de Ponto Mensal - Vipol</title>
    
    <!-- Scripts do Firebase (SDK v9 via compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            color-scheme: light;
        }
        
        html, body {
            background-color: #ffffff !important;
            color: #1e293b !important;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 10px;
            padding-bottom: 420px; /* Espaço confortável para o celular */
            box-sizing: border-box;
            -webkit-text-size-adjust: 100%;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        .topo {
            text-align: center;
            margin: 10px 0 20px 0;
            max-width: 480px;
            margin-left: auto;
            margin-right: auto;
        }

        .titulo {
            font-size: 20px;
            font-weight: bold;
            color: #1a365d !important;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .month-select {
            width: 200px;
            border: none;
            border-bottom: 2px solid #1a365d;
            font-size: 18px;
            text-align: center;
            font-weight: bold;
            outline: none;
            background: #ffffff !important;
            color: #1a365d !important;
            margin-bottom: 15px;
            cursor: pointer;
        }

        .info-colaborador {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #f8fafc !important;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            padding: 12px;
            text-align: left;
            margin-bottom: 15px;
        }

        .info-campo {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: bold;
            color: #475569 !important;
        }

        .info-campo input {
            flex: 1;
            border: none;
            border-bottom: 1px dashed #cbd5e1;
            background: transparent !important;
            font-size: 13px;
            font-weight: bold;
            color: #0f172a !important;
            outline: none;
            padding: 2px 4px;
        }

        .lista-pontos {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
        }

        .card-dia {
            background: #ffffff !important;
            border-radius: 8px;
            padding: 12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);

        .card-dia.dia-folga {

        .card-dia.janta-reduzida {
            background: #fff7ed !important;

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;

            margin-bottom: 12px;

        .dia-badge {
            background: #1a365d !important;
            color: #ffffff !important;
            padding: 4px 12px;
            border-radius: 6px;

            font-size: 14px;
        }

        .card-dia.dia-folga .dia-badge { background: #64748b !important; }

        .valores-dia {
            display: flex;

        .v-extra { color: #16a34a !important; }
        .v-money { color: #1a365d !important; }

        .inputs-row {
            display: grid;

        }

        .campo {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .campo label {
            font-size: 11px;
            font-weight: bold;
            color: #64748b !important;
            text-transform: uppercase;
        }

        .campo input {
            width: 100%;
            padding: 10px 5px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 15px;
            text-align: center;
            outline: none;
            background: #f8fafc !important;
            font-weight: bold;
            color: #334155 !important;
        }

        .campo input:focus {
            border-color: #1a365d;
            background: #ffffff !important;
        }

        .painel-resumo {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #ffffff !important;
            border-top: 3px solid #1a365d;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
            padding: 12px;
            z-index: 999;
        }

        .resumo-conteudo {
            max-width: 480px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px 12px;
        }

        .resumo-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
            border-bottom: 1px dashed #e2e8f0;
            padding-bottom: 3px;
            color: #0f172a !important;
        }

        .resumo-item span:first-child { color: #64748b !important; }

        .resumo-item input {
            width: 90px;
            border: none;
            text-align: right;
            font-size: 12px;
            font-weight: bold;
            outline: none;
            color: #1e293b !important;
            background: transparent !important;

        .resumo-item .editavel {
            border: 1px solid #cbd5e1;
            background: #f8fafc !important;

        .caixa-total-final {
            grid-column: span 2;
            background: #1a365d !important;
            color: #ffffff !important;
            padding: 8px 10px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 2px;
        }

        .caixa-total-final span:last-child { font-size: 16px; font-weight: 950; }

        .status-nuvem {
            grid-column: span 2;
            font-size: 11px;
            text-align: center;
            color: #64748b;
            font-weight: bold;
            margin-top: -2px;
        }

        .btn-pdf-container { grid-column: span 2; margin-top: 2px; }

        .btn-pdf {
            width: 100%;
            background-color: #16a34a !important;
            color: #ffffff !important;
            border: none;
            padding: 10px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
        }

        @media print {
            body { padding-bottom: 0 !important; background: #ffffff !important; }
            .info-colaborador { background: #ffffff !important; border: 1px solid #94a3b8 !important; }
            .info-colaborador input { border-bottom: none !important; }
            .painel-resumo { position: static !important; box-shadow: none !important; border-top: 2px solid #1a365d !important; margin-top: 30px !important; page-break-inside: avoid; }
            .btn-pdf-container, .status-nuvem { display: none !important; }
            .card-dia { page-break-inside: avoid !important; }
            .ocultar-no-pdf { display: none !important; }
            .month-select { border: none !important; appearance: none; -webkit-appearance: none; }
        }
    </style>
</head>
<body>

    <div class="topo">
        <div class="titulo">Folha de Ponto Mensal</div>
        
        <select id="sel-mes" class="month-select" onchange="carregarMes()">
            <option value="Janeiro">JANEIRO</option>
            <option value="Fevereiro">FEVEREIRO</option>
            <option value="Marco">MARÇO</option>

            <option value="Junho">JUNHO</option>
            <option value="Julho" selected>JULHO</option>
            <option value="Agosto">AGOSTO</option>
            <option value="Setembro">SETEMBRO</option>

            <option value="Novembro">CONVENÇÃO</option>
            <option value="Dezembro">DEZEMBRO</option>
        </select>
        
        <div class="info-colaborador">
            <div class="info-campo"><span>Empresa:</span><input type="text" value="Vipol" readonly></div>
            <div class="info-campo"><span>Colaborador:</span><input type="text" value="Carlos Vinicius de Oliveira" readonly></div>
            <div class="info-campo"><span>Registro (Chapa):</span><input type="text" value="17808" readonly></div>
        </div>
    </div>

    <div class="lista-pontos" id="lista-pontos"></div>

    <div class="painel-resumo">
        <div class="resumo-conteudo">
            <div class="resumo-item"><span>Total Mês:</span><input type="text" id="total-dias-trab" readonly value="0 dias" style="color:#64748b !important;"></div>
            <div class="resumo-item"><span>Salário Base:</span><input type="text" value="R$ 3143,00" readonly style="color:#64748b !important;"></div>
            <div class="resumo-item"><span>Extras Totais (Real):</span><input type="text" id="resumo-horas-banco" readonly value="0:00" style="color: #16a34a !important;" title="Horas reais de relógio para bater com a empresa"></div>
            <div class="resumo-item"><span>Vale (Dia 20 - 40%):</span><input type="text" value="R$ 1258,00" readonly style="color:#dc2626 !important; font-weight: bold;"></div>
            
            <!-- Ganhos com Adicionais calculados de forma justa por trás -->
            <div class="resumo-item"><span>Horas Extras (R$):</span><input type="text" id="resumo-extras-reais" readonly value="R$ 0,00" style="color: #16a34a !important;"></div>
            <div class="resumo-item"><span>Adicional Noturno (R$):</span><input type="text" id="resumo-adicional-noturno" readonly value="R$ 0,00" style="color: #16a34a !important; font-weight: bold;"></div>
            
            <div class="resumo-item"><span>Passagens:</span><input type="text" id="input-passagem" class="editavel" placeholder="0.00" oninput="salvarEDigitar()"></div>
            <div class="resumo-item" style="background: #f8fafc !important; padding: 3px; border-radius: 4px;">
                <span style="color: #1e3a8a !important;">A Receber (Dia 05):</span>
                <input type="text" id="txt-receber-dia-05" readonly value="R$ 0,00" style="color: #1e3a8a !important; font-weight: 900;">
            </div>
            
            <div class="caixa-total-final">
                <span>TOTAL BRUTO + BENEFÍCIOS:</span>
                <span id="txt-total-final">R$ 3.143,00</span>
            </div>
            <div class="status-nuvem" id="txt-status-nuvem">Conectando ao Firebase ☁️</div>
            <div class="btn-pdf-container">
                <button class="btn-pdf" onclick="abrirTelaImpressaoPDF()">Gerar Relatório PDF</button>
            </div>
        </div>
    </div>

<script>
    // Credenciais do Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyCjVJ_F2h8dMyY91jjo-kvQ",
        authDomain: "vipolextras.firebaseapp.com",
        projectId: "vipolextras",
        storageBucket: "vipolextras.appspot.com",
        messagingSenderId: "1001511250504",
        appId: "1:1001511250504:web:ea7bfab1a5f6e3c50979d0"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let timeoutSalvar = null;

    function inicializarDias() {
        const container = document.getElementById('lista-pontos');
        let htmlDias = '';
        for (let i = 1; i <= 31; i++) {
            let d = i < 10 ? '0' + i : i;
            htmlDias += `
            <div class="card-dia linha-ponto" id="card-dia-${i}">
                <div class="card-header">
                    <span class="dia-badge">Dia ${d}</span>
                    <div class="valores-dia"><span class="v-extra id-extra-relogio">0:00</span><span class="v-money id-extra-dinheiro">R$ 0,00</span></div>
                </div>
                <div class="inputs-row">
                    <div class="campo"><label>Entrada</label><input type="text" class="in-entrada" placeholder="08:00" oninput="salvarEDigitar()"></div>
                    <div class="campo"><label>Minutos Janta</label><input type="text" class="in-janta" placeholder="60" oninput="salvarEDigitar()"></div>
                    <div class="campo"><label>Saída</label><input type="text" class="in-saida" placeholder="16:20" oninput="salvarEDigitar()"></div>
                </div>
            </div>`;
        }
        container.innerHTML = htmlDias;
    }

    function textoParaMinutos(stringHora) {
        if (!stringHora || !stringHora.includes(':')) return null;
        const partes = stringHora.split(':');
        return (parseInt(partes[0], 10) || 0) * 60 + (parseInt(partes[1], 10) || 0);
    }

    function minutesParaTexto(minutos) {
        if (minutos <= 0) return "0:00";
        const h = Math.floor(minutos / 60);
        const m = Math.floor(minutos % 60);
        return `${h}:${m < 10 ? '0' : ''}${m}`;
    }

    // Identifica e separa os minutos diurnos e noturnos de relógio comum (Período Noturno das 22h às 05h)
    function separarMinutosDiurnosENoturnos(entradaMin, saidaMin) {
        let diurnos = 0;
        let noturnos = 0;
        let atual = entradaMin;

        while (atual < saidaMin) {
            let minutoDoDia = atual % 1440;
            if (minutoDoDia >= 1320 || minutoDoDia < 300) {
                noturnos++;
            } else {
                diurnos++;
            }
            atual++;
        }
        return { diurnos, noturnos };
    }

    function calcularTudo() {
        const todosOsCards = document.querySelectorAll('.linha-ponto');
        let acumuladoMinutosExtrasMesRelogio = 0; // Guardará as horas extras REAIS de relógio para bater com a empresa
        let ganhoTotalExtrasReais = 0;
        let ganhoTotalAdicionalNoturnoReais = 0;
        let diasTrabalhadosContador = 0;
        
        const JORNADA_CONTRATUAL_MINUTOS = 440; // 7 horas e 20 minutos de relógio
        const SALARIO_BASE = 3143.00;
        const VALE_FIXO = 1258.00;
        const HORA_NORMAL = SALARIO_BASE / 220;
        
        const VALOR_ADICIONAL_NOTURNO_HORA = HORA_NORMAL * 0.20;

        todosOsCards.forEach(card => {
            const entradaTxt = card.querySelector('.in-entrada').value.trim().toUpperCase();
            const saidaTxt = card.querySelector('.in-saida').value.trim().toUpperCase();
            const jantaTxt = card.querySelector('.in-janta').value.trim();
            
            const txtRelogio = card.querySelector('.id-extra-relogio');
            const txtDinheiro = card.querySelector('.id-extra-dinheiro');

            const checarFolga = (txt) => txt === 'F' || txt === 'FOLGA' || txt === 'FDS';

            if (checarFolga(entradaTxt) || checarFolga(saidaTxt)) {
                card.classList.add('dia-folga');
                card.classList.remove('janta-reduzida');
                txtRelogio.innerText = "Folga";
                txtDinheiro.innerText = "R$ 0,00";
                return;
            } else {
                card.classList.remove('dia-folga');
            }

            let minutosDeJantaDoDia = parseInt(jantaTxt, 10);
            if (isNaN(minutosDeJantaDoDia)) { minutosDeJantaDoDia = 60; }

            if (minutosDeJantaDoDia < 60 && jantaTxt !== "") {
                card.classList.add('janta-reduzida');
            } else {
                card.classList.remove('janta-reduzida');
            }

            const entradaMin = textoParaMinutos(entradaTxt);
            let saidaMin = textoParaMinutos(saidaTxt);

            if (entradaMin !== null && saidaMin !== null) {
                diasTrabalhadosContador++;
                
                if (saidaMin <= entradaMin) { saidaMin += 1440; } // Tratamento para virada de dia

                let tempoTotalNaEmpresa = saidaMin - entradaMin;
                let tempoTrabalhadoNoDiaRelogio = tempoTotalNaEmpresa - minutosDeJantaDoDia;

                // 1. Separa o tempo bruto trabalhado entre Diurno e Noturno de relógio
                let tempos = separarMinutosDiurnosENoturnos(entradaMin, saidaMin);
                let diurnosBruto = tempos.diurnos;
                let noturnosBruto = tempos.noturnos;
                let totalBrutoMinutos = diurnosBruto + noturnosBruto;

                // 2. Desconta a janta proporcionalmente de cada período
                if (totalBrutoMinutos > 0) {
                    let proporcaoDiurna = diurnosBruto / totalBrutoMinutos;
                    let proporcaoNoturna = noturnosBruto / totalBrutoMinutos;
                    diurnosBruto = Math.max(0, diurnosBruto - (minutosDeJantaDoDia * proporcaoDiurna));
                    noturnosBruto = Math.max(0, noturnosBruto - (minutosDeJantaDoDia * proporcaoNoturna));
                }

                // 3. Aplicação do fator da hora noturna reduzida (Fator 1.142857) - APENAS NOS BASTIDORES DO DINHEIRO
                let noturnosFicticios = noturnosBruto * 1.142857;
                let totalEfetivoTrabalhadoNoDiaDinheiro = diurnosBruto + noturnosFicticios;

                // 4. Verificação de Horas Extras REAIS de relógio para exibição visual (Evita dar divergência na Vipol)
                if (tempoTrabalhadoNoDiaRelogio > JORNADA_CONTRATUAL_MINUTOS) {
                    const extraDoDiaRelogioMinutos = tempoTrabalhadoNoDiaRelogio - JORNADA_CONTRATUAL_MINUTOS;
                    acumuladoMinutosExtrasMesRelogio += extraDoDiaRelogioMinutos;

                    // Mostra no cartão do dia o valor exato de relógio (sem a hora reduzida visível)
                    txtRelogio.innerText = minutesParaTexto(extraDoDiaRelogioMinutos);

                    // Nos bastidores, calculamos o pagamento correto usando a hora reduzida fictícia:
                    let extrasDoDiaDinheiroMinutos = totalEfetivoTrabalhadoNoDiaDinheiro - JORNADA_CONTRATUAL_MINUTOS;
                    let proporcaoNoturnaEfetiva = noturnosFicticios / totalEfetivoTrabalhadoNoDiaDinheiro;

                    let extrasNoturnasMinutos = extrasDoDiaDinheiroMinutos * proporcaoNoturnaEfetiva;
                    let extrasDiurnasMinutos = extrasDoDiaDinheiroMinutos * (1 - proporcaoNoturnaEfetiva);

                    // Pagamento correto das extras na conta:
                    let ganhoExtraDiurno = (extrasDiurnasMinutos / 60) * (HORA_NORMAL * 1.5);
                    let ganhoExtraNoturno = (extrasNoturnasMinutos / 60) * (HORA_NORMAL * 1.8); // 50% + 20%
                    let ganhoExtrasDia = ganhoExtraDiurno + ganhoExtraNoturno;
                    
                    ganhoTotalExtrasReais += ganhoExtrasDia;

                    // Adicional Noturno Normal (sobre a jornada comum restante)
                    let noturnasComunsMinutos = noturnosFicticios - extrasNoturnasMinutos;
                    let ganhoNoturnoNormalDia = (noturnasComunsMinutos / 60) * VALOR_ADICIONAL_NOTURNO_HORA;
                    ganhoTotalAdicionalNoturnoReais += ganhoNoturnoNormalDia;

                    txtDinheiro.innerText = "R$ " + ganhoExtrasDia.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                } else {
                    // Sem horas extras, apenas calcula o adicional noturno das horas comuns trabalhadas à noite
                    let ganhoNoturnoNormalDia = (noturnosFicticios / 60) * VALOR_ADICIONAL_NOTURNO_HORA;
                    ganhoTotalAdicionalNoturnoReais += ganhoNoturnoNormalDia;

                    txtRelogio.innerText = "0:00";
                    txtDinheiro.innerText = "R$ 0,00";
                }
            } else {
                txtRelogio.innerText = "0:00";
                txtDinheiro.innerText = "R$ 0,00";
            }
        });

        // Atualização do painel de resumo
        document.getElementById('total-dias-trab').value = diasTrabalhadosContador + " dias";
        
        // Exibe o total acumulado das Extras em horas REAIS de relógio (baterá 100% com a folha da Vipol)
        document.getElementById('resumo-horas-banco').value = minutesParaTexto(acumuladoMinutosExtrasMesRelogio);
        
        // Exibe os valores em dinheiro com todas as leis calculadas perfeitamente por trás
        document.getElementById('resumo-extras-reais').value = "R$ " + ganhoTotalExtrasReais.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        document.getElementById('resumo-adicional-noturno').value = "R$ " + ganhoTotalAdicionalNoturnoReais.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

        // Passagens
        let passagens = parseFloat(document.getElementById('input-passagem').value.replace(',', '.')) || 0;

        // Totais Finais
        const totalBrutoComExtrasEBeneficios = SALARIO_BASE + ganhoTotalExtrasReais + ganhoTotalAdicionalNoturnoReais + passagens;
        const oQueRestaReceberDia05 = totalBrutoComExtrasEBeneficios - VALE_FIXO;

        document.getElementById('txt-receber-dia-05').value = "R$ " + oQueRestaReceberDia05.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        document.getElementById('txt-total-final').innerText = "R$ " + totalBrutoComExtrasEBeneficios.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function obterChaveAtual() {
        return document.getElementById('sel-mes').value;
    }

    function salvarEDigitar() {
        calcularTudo();
        
        document.getElementById('txt-status-nuvem').innerText = "Digitando... ⏳";

        clearTimeout(timeoutSalvar);
        
        timeoutSalvar = setTimeout(() => {
            const mesAtual = obterChaveAtual();
            const dadosMes = {
                passagem: document.getElementById('input-passagem').value,
                dias: []
            };

            for (let i = 1; i <= 31; i++) {
                const card = document.getElementById(`card-dia-${i}`);
                dadosMes.dias.push({
                    ent: card.querySelector('.in-entrada').value,
                    jan: card.querySelector('.in-janta').value,
                    sai: card.querySelector('.in-saida').value
                });
            }

            db.collection("pontos_carlos").doc(mesAtual).set(dadosMes)
            .then(() => {
                document.getElementById('txt-status-nuvem').innerText = "Alterações salvas na Nuvem! ✅";
            })
            .catch((error) => {
                document.getElementById('txt-status-nuvem').innerText = "Erro ao salvar na Nuvem ❌";
                console.error("Erro Firebase: ", error);
            });
        }, 1000);
    }

    function carregarMes() {
        document.getElementById('txt-status-nuvem').innerText = "Carregando dados... 🔄";
        const mesAtual = obterChaveAtual();

        db.collection("pontos_carlos").doc(mesAtual).get()
        .then((doc) => {
            if (doc.exists) {
                const dados = doc.data();
                document.getElementById('input-passagem').value = dados.passagem || "";
                
                for (let i = 1; i <= 31; i++) {
                    const card = document.getElementById(`card-dia-${i}`);
                    if (dados.dias && dados.dias[i-1]) {
                        card.querySelector('.in-entrada').value = dados.dias[i-1].ent || "";
                        card.querySelector('.in-janta').value = dados.dias[i-1].jan || "";
                        card.querySelector('.in-saida').value = dados.dias[i-1].sai || "";
                    } else {
                        card.querySelector('.in-entrada').value = "";
                        card.querySelector('.in-janta').value = "60";
                        card.querySelector('.in-saida').value = "";
                    }
                }
                document.getElementById('txt-status-nuvem').innerText = "Dados carregados da Nuvem! ☁️";
            } else {
                document.getElementById('input-passagem').value = "";
                for (let i = 1; i <= 31; i++) {
                    const card = document.getElementById(`card-dia-${i}`);
                    card.querySelector('.in-entrada').value = "";
                    card.querySelector('.in-janta').value = "60";
                    card.querySelector('.in-saida').value = "";
                }
                document.getElementById('txt-status-nuvem').innerText = "Mês limpo ou sem registros na Nuvem! 📂";
            }
            calcularTudo();
        })
        .catch((error) => {
            document.getElementById('txt-status-nuvem').innerText = "Erro ao conectar com a Nuvem ❌";
            console.error("Erro ao carregar: ", error);
        });
    }

    function abrirTelaImpressaoPDF() {
        const todosOsCards = document.querySelectorAll('.linha-ponto');
        
        todosOsCards.forEach(card => {
            const entrada = card.querySelector('.in-entrada').value.trim();
            const saida = card.querySelector('.in-saida').value.trim();
            if (entrada === "" && saida === "") {
                card.classList.add('ocultar-no-pdf');
            }
        });

        window.print();

        setTimeout(() => {
            todosOsCards.forEach(card => card.classList.remove('ocultar-no-pdf'));
        }, 1000);
    }

    window.onload = function() {
        inicializarDias();
        carregarMes();
    };
</script>
</body>
</html>
