<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="dark">
    <title>Folha de Ponto Mensal - Vipol</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

    <style>
        :root {
            color-scheme: dark;
        }
        
        html, body {
            background-color: #121214 !important; /* Tom de cinza escuro idêntico ao seu print */
            color: #e2e8f0 !important;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 10px;
            padding-bottom: 520px; /* Espaço para o painel de resumo inferior */
            box-sizing: border-box;
            -webkit-text-size-adjust: 100%;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        .topo {
            text-align: center;
            margin: 15px auto;
            max-width: 480px;
        }

        .titulo {
            font-size: 24px;
            font-weight: 800;
            color: #dae5f0 !important;
            text-transform: uppercase;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .month-select {
            width: 200px;
            border: none;
            border-bottom: 2px solid #27272a;
            font-size: 20px;
            text-align: center;
            font-weight: bold;
            outline: none;
            background: transparent !important;
            color: #dae5f0 !important;
            margin-bottom: 15px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .info-colaborador {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #18181c !important; /* Bloco cinza escuro */
            border: 1px solid #2d2d34;
            border-radius: 12px;
            padding: 16px;
            text-align: left;
            margin-bottom: 15px;
        }

        .info-campo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: bold;
            color: #94a3b8 !important;
        }

        .info-campo span {
            white-space: nowrap;
        }

        .info-campo input {
            flex: 1;
            border: none;
            border-bottom: 1px dashed #2d2d34;
            background: transparent !important;
            font-size: 15px;
            font-weight: bold;
            color: #ffffff !important;
            outline: none;
            padding: 2px 4px;
        }

        .info-campo input.editavel-perfil {
            background: #121214 !important;
            border: 1px solid #2d2d34;
            border-radius: 8px;
            padding: 6px 12px;
            width: 70px;
            flex: none;
            text-align: center;
            font-size: 15px;
            color: #ffffff !important;
        }

        .lista-pontos {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
        }

        .card-dia {
            background: #18181c !important;
            border-radius: 12px;
            padding: 14px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            border: 1px solid #2d2d34;
        }
