<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vipolextras - Registo de Horas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 0;
            background-color: #f4f4f9;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 20px 25px rgba(0,0,0,0.1);
        }
        h2 { text-align: center; color: #333; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; }
        input, select, button { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #28a745; color: white; font-size: 16px; border: none; cursor: pointer; }
        button:hover { background-color: #218838; }
        .registro-item { background: #eee; padding: 10px; margin-top: 10px; border-radius: 4px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Registo de Horas - Vipolextras</h2>
    <form id="pontoForm">
        <label for="data">Data:</label>
        <input type="date" id="data" required>

        <label for="entrada">Hora de Entrada:</label>
        <input type="time" id="entrada" required>

        <label for="saida">Hora de Saída:</label>
        <input type="time" id="saida" required>

        <label for="obs">Observações (Opcional):</label>
        <input type="text" id="obs" placeholder="Ex: Horas extras na linha 2">

        <button type="submit">Salvar Registo</button>
    </form>

    <h3 style="margin-top:25px;">Registos Recentes (Nuvem)</h3>
    <div id="historico">Carregando registos...</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // Configuração do seu projeto Firebase obtida no console
    const firebaseConfig = {
        apiKey: "AIzaSyCjVJ_F2h8dMyY91jjo-kvQ",
        authDomain: "vipolextras.firebaseapp.com",
        projectId: "vipolextras",
        storageBucket: "vipolextras.firebasestorage.app",
        messagingSenderId: "1001511250504",
        appId: "1:1001511250504:web:ea7bfab1a5f6e3c50979d0"
    };

    // Inicializa o Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Referência para a coleção de registos no banco de dados
    const registosCollection = collection(db, "horas_trabalhadas");

    // Formatar data para exibição PT-BR
    function formatarData(dataStr) {
        const partes = dataStr.split('-');
        return `${partes[2]}/${partes[1]}/${partes[0]}`;
    }

    // Evento de envio do formulário para salvar no banco
    document.getElementById('pontoForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const data = document.getElementById('data').value;
        const entrada = document.getElementById('entrada').value;
        const saida = document.getElementById('saida').value;
        const obs = document.getElementById('obs').value;

        try {
            await addDoc(registosCollection, {
                data: data,
                entrada: entrada,
                saida: saida,
                observacao: obs,
                criadoEm: new Date().toISOString()
            });
            alert('Registo salvo com sucesso na nuvem!');
            document.getElementById('pontoForm').reset();
        } catch (error) {
            console.error("Erro ao salvar:", error);
            alert('Erro ao salvar no banco de dados. Verifique as regras do Firestore.');
        }
    });

    // Escutar atualizações do banco em tempo real para exibir na tela
    const q = query(registosCollection, orderBy("criadoEm", "desc"));
    onSnapshot(q, (snapshot) => {
        const historicoDiv = document.getElementById('historico');
        historicoDiv.innerHTML = '';
        
        if (snapshot.empty) {
            historicoDiv.innerHTML = '<p>Nenhum registo encontrado.</p>';
            return;
        }

        snapshot.forEach((doc) => {
            const dados = doc.data();
            const item = document.createElement('div');
            item.className = 'registro-item';
            item.innerHTML = `
                <strong>Data:</strong> ${formatarData(dados.data)} <br>
                <strong>Entrada:</strong> ${dados.entrada} | <strong>Saída:</strong> ${dados.saida} <br>
                ${dados.observacao ? `<strong>Obs:</strong> ${dados.observacao}` : ''}
            `;
            historicoDiv.appendChild(item);
        });
    });
</script>

</body>
</html>
